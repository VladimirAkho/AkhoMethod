<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AkhoMethod — Владимир Ахотелашвили</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0A0906;
    --black-soft: #12100B;
    --gold: #C9A84C;
    --gold-light: #E8C96D;
    --gold-dim: rgba(201,168,76,0.5);
    --white: #F5F2EC;
    --gray: #9a9488;
    --card: rgba(255,255,255,0.03);
    --card-border: rgba(201,168,76,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .emblem {
    width: 200px; height: 200px;
    margin-bottom: 26px;
    display: flex; align-items: center; justify-content: center;
    animation: fadeUp 0.9s ease both, breathe 6s ease-in-out infinite;
    filter: drop-shadow(0 0 22px rgba(201,168,76,0.25));
  }
  .emblem-img { width: 100%; height: 100%; object-fit: contain; display: block; }
  @keyframes breathe {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(201,168,76,0.2)); }
    50% { transform: scale(1.03); filter: drop-shadow(0 0 30px rgba(201,168,76,0.4)); }
  }

  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Corner frame */
  .frame {
    position: fixed;
    inset: 16px;
    pointer-events: none;
    z-index: 1;
  }
  .frame span {
    position: absolute;
    width: 26px; height: 26px;
    border: 1.5px solid var(--gold-dim);
  }
  .frame span:nth-child(1) { top: 0; left: 0; border-right: none; border-bottom: none; }
  .frame span:nth-child(2) { top: 0; right: 0; border-left: none; border-bottom: none; }
  .frame span:nth-child(3) { bottom: 0; left: 0; border-right: none; border-top: none; }
  .frame span:nth-child(4) { bottom: 0; right: 0; border-left: none; border-top: none; }

  /* Emblem — mandala */





  @keyframes spinRev { from { transform: rotate(360deg);} to { transform: rotate(0deg);} }






  .eyebrow {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    animation: fadeUp 0.8s 0.1s ease both;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    animation: fadeUp 0.8s 0.15s ease both;
  }
  h1 .method { color: var(--gold-light); font-style: italic; }

  .name {
    font-size: 14px;
    color: var(--gray);
    letter-spacing: 1px;
    margin-bottom: 6px;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .tagline {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.25s ease both;
  }
  .tagline .dot { color: var(--gold-dim); margin: 0 6px; }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 17px 22px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 2px;
    color: var(--white);
    text-decoration: none;
    text-align: left;
    transition: all 0.35s cubic-bezier(0.2,0.7,0.2,1);
    animation: fadeUp 0.7s ease both;
    position: relative;
    overflow: hidden;
  }
  .link::after {
    content: '→';
    margin-left: auto;
    color: var(--gold);
    font-size: 15px;
    opacity: 0.5;
    transition: transform 0.35s, opacity 0.35s;
  }
  .link:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
    transform: translateY(-2px);
  }
  .link:hover::after { transform: translateX(4px); opacity: 1; }

  .link:nth-child(1) { animation-delay: 0.3s; }
  .link:nth-child(2) { animation-delay: 0.37s; }
  .link:nth-child(3) { animation-delay: 0.44s; }
  .link:nth-child(4) { animation-delay: 0.51s; }
  .link:nth-child(5) { animation-delay: 0.58s; }

  .link-icon {
    width: 34px; height: 34px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
  }
  .link-icon svg { width: 22px; height: 22px; }

  .link-text { display: flex; flex-direction: column; gap: 2px; }
  .link-title { font-size: 15px; font-weight: 400; color: var(--white); letter-spacing: 0.3px; }
  .link-sub { font-size: 11px; color: var(--gray); letter-spacing: 0.5px; }

  /* Featured link — retreat */
  .link.featured {
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
    border-color: var(--gold);
  }
  .link.featured .link-title { color: var(--gold-light); }

  footer {
    margin-top: 36px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dim);
    animation: fadeUp 0.8s 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes drawIn {
    from { stroke-dashoffset: 400; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }

  @media (max-width: 420px) {
    h1 { font-size: 34px; }
    .link { padding: 15px 18px; }
  }
</style>
</head>
